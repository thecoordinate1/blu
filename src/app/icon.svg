  />
  <path 
    d="M17 19L19 21L22 17" 
    stroke="#22D3A0" 
    stroke-width="2" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
  
  <!-- Cheeks -->
  <circle cx="8.5" cy="23.5" r="0.8" fill="#FF4D6D" opacity="0.7" />
  <circle cx="23.5" cy="23.5" r="0.8" fill="#FF4D6D" opacity="0.7" />
  
  <!-- Mouth -->
  <path 
    d="M14 23H18" 
